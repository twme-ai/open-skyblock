    material: EXPERIENCE_BOTTLE
    description:
      - "<gray>Gain levels across configured skills.</gray>"
    objective:
      type: TOTAL_SKILL_LEVEL
      required: 10
  FARMING_APPRENTICE:
    sort: 40
    display-name: "<gold>Farming Apprentice</gold>"
    category: "Skills"
    material: WHEAT
    description:
      - "<gray>Reach Farming Level 5.</gray>"
    objective:
      type: SKILL_LEVEL
      target: FARMING
      required: 5
  WHEAT_COLLECTION:
    sort: 50
    display-name: "<yellow>Wheat Collection I</yellow>"
