quests:
  CREATE_PRIVATE_ISLAND:
    sort: 10
    display-name: "<green>Create a Private Island</green>"
    category: "Getting Started"
    material: GRASS_BLOCK
    description:
      - "<gray>Create or visit your private island.</gray>"
      - "<dark_gray>Use /skyblock island create.</dark_gray>"
    objective:
      type: ISLAND_CREATED
      required: 1
  REACH_SKYBLOCK_LEVEL_5:
    sort: 20
    display-name: "<aqua>Reach SkyBlock Level 5</aqua>"
    category: "Progression"
    material: NETHER_STAR
    description:
      - "<gray>Earn SkyBlock XP from skills, collections, and milestones.</gray>"
    objective:
      type: SKYBLOCK_LEVEL
      required: 5
  TRAIN_SKILLS:
    sort: 30
    display-name: "<yellow>Train Your Skills</yellow>"
