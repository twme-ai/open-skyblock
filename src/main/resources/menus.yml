skyblock:
  title: "<dark_gray>SkyBlock Menu</dark_gray>"
  rows: 4
  filler:
    enabled: true
    material: GRAY_STAINED_GLASS_PANE
    display-name: "<dark_gray></dark_gray>"
    lore: []
  items:
    profile:
      slot: 10
      material: PLAYER_HEAD
      display-name: "<green>Your Profile</green>"
      lore:
        - "<gray>Player:</gray> <yellow><player></yellow>"
        - "<gray>SkyBlock Level:</gray> <yellow><level></yellow>"
        - "<gray>Purse:</gray> <gold><purse></gold>"
      action: PROFILE
    island:
      slot: 12
      material: GRASS_BLOCK
      display-name: "<green>Private Island</green>"
      lore:
        - "<gray>Travel to your private island.</gray>"
      action: ISLAND_HOME
    sacks:
      slot: 13
      material: BUNDLE
      display-name: "<green>Sacks</green>"
      lore:
        - "<gray>Store matching materials automatically.</gray>"
      action: SACKS
    quiver:
      slot: 11
      material: ARROW
      display-name: "<green>Quiver</green>"
      lore:
        - "<gray>Store arrows and select your firing arrow.</gray>"
      action: QUIVER
    skills:
      slot: 14
      material: DIAMOND_PICKAXE
      display-name: "<aqua>Skills</aqua>"
      lore:
        - "<gray>View your skill progression.</gray>"
      action: SKILLS
    stats:
      slot: 15
      material: DIAMOND_SWORD
      display-name: "<red>Stats</red>"
      lore:
        - "<gray>View your aggregated combat stats.</gray>"
      action: STATS
    accessory-bag:
      slot: 16
      material: ENDER_CHEST
      display-name: "<light_purple>Accessory Bag</light_purple>"
      lore:
        - "<gray>Store accessories and gain Magical Power.</gray>"
      action: ACCESSORY_BAG
    storage:
      slot: 17
      material: CHEST
      display-name: "<gold>Storage</gold>"
      lore:
        - "<gray>Open your persistent Storage pages.</gray>"
      action: STORAGE
    tuning:
      slot: 18
      material: AMETHYST_SHARD
      display-name: "<light_purple>Stats Tuning</light_purple>"
      lore:
        - "<gray>Spend tuning points from Magical Power.</gray>"
      action: TUNING
    equipment:
      slot: 19
      material: CHAINMAIL_CHESTPLATE
      display-name: "<yellow>Equipment</yellow>"
      lore:
        - "<gray>Equip necklaces, cloaks, belts, and gloves.</gray>"
      action: EQUIPMENT
    wardrobe:
      slot: 21
      material: ARMOR_STAND
      display-name: "<aqua>Wardrobe</aqua>"
      lore:
        - "<gray>Store and swap armor setups.</gray>"
      action: WARDROBE
    collections:
      slot: 26
      material: CHEST
      display-name: "<gold>Collections</gold>"
      lore:
        - "<gray>View your collection tiers.</gray>"
      action: COLLECTIONS
    recipes:
      slot: 20
      material: CRAFTING_TABLE
      display-name: "<green>Recipes</green>"
      lore:
        - "<gray>View unlocked SkyBlock recipes.</gray>"
      action: RECIPES
    bank:
      slot: 22
      material: GOLD_INGOT
      display-name: "<gold>Bank</gold>"
      lore:
        - "<gray>Purse:</gray> <gold><purse></gold>"
        - "<gray>Bank:</gray> <gold><bank></gold>"
      action: BANK
    shops:
      slot: 23
      material: EMERALD
      display-name: "<green>NPC Shops</green>"
      lore:
        - "<gray>Browse configured NPC merchants.</gray>"
      action: SHOPS
    auctions:
      slot: 30
      material: GOLDEN_HORSE_ARMOR
      display-name: "<gold>Auction House</gold>"
      lore:
        - "<gray>Browse BIN and bid listings.</gray>"
      action: AUCTIONS
    pets:
      slot: 24
      material: BONE
      display-name: "<aqua>Pets</aqua>"
      lore:
        - "<gray>View, level, and summon your pets.</gray>"
      action: PETS
    minions:
      slot: 25
      material: HAY_BLOCK
      display-name: "<yellow>Minions</yellow>"
      lore:
        - "<gray>View recorded minions.</gray>"
      action: MINIONS
    reforge-anvil:
      slot: 27
      material: ANVIL
      display-name: "<gold>Reforge Anvil</gold>"
      lore:
        - "<gray>Apply configured reforges and Reforge Stones.</gray>"
      action: REFORGE_ANVIL
    enchanting-table:
      slot: 28
      material: ENCHANTING_TABLE
      display-name: "<light_purple>Enchanting Table</light_purple>"
      lore:
        - "<gray>Apply configured enchantments to custom items.</gray>"
      action: ENCHANTING_TABLE
    enchanting-anvil:
      slot: 29
      material: ANVIL
      display-name: "<gold>Anvil</gold>"
      lore:
        - "<gray>Apply configured enchanted books to custom items.</gray>"
      action: ENCHANTING_ANVIL

