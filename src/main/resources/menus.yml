skyblock:
  title: "<dark_gray>SkyBlock Menu</dark_gray>"
  rows: 4
  filler:
    enabled: true
    material: GRAY_STAINED_GLASS_PANE
    display-name: "<dark_gray></dark_gray>"
    lore: []
  items:
    profile:
      slot: 10
      material: PLAYER_HEAD
      display-name: "<green>Your Profile</green>"
      lore:
        - "<gray>Player:</gray> <yellow><player></yellow>"
        - "<gray>SkyBlock Level:</gray> <yellow><level></yellow>"
        - "<gray>Purse:</gray> <gold><purse></gold>"
      action: PROFILE
    island:
      slot: 12
      material: GRASS_BLOCK
      display-name: "<green>Private Island</green>"
      lore:
        - "<gray>Manage your island, visitors, and home warp.</gray>"
      action: ISLAND_MENU
    sacks:
      slot: 13
      material: BUNDLE
      display-name: "<green>Sacks</green>"
      lore:
        - "<gray>Store matching materials automatically.</gray>"
      action: SACKS
    quiver:
      slot: 11
      material: ARROW
      display-name: "<green>Quiver</green>"
      lore:
        - "<gray>Store arrows and select your firing arrow.</gray>"
      action: QUIVER
    skills:
      slot: 14
      material: DIAMOND_PICKAXE
      display-name: "<aqua>Skills</aqua>"
      lore:
        - "<gray>View your skill progression.</gray>"
      action: SKILLS
    stats:
      slot: 15
      material: DIAMOND_SWORD
      display-name: "<red>Stats</red>"
      lore:
        - "<gray>View your aggregated combat stats.</gray>"
      action: STATS
    accessory-bag:
      slot: 16
      material: ENDER_CHEST
      display-name: "<light_purple>Accessory Bag</light_purple>"
      lore:
        - "<gray>Store accessories and gain Magical Power.</gray>"
      action: ACCESSORY_BAG
    storage:
      slot: 17
      material: CHEST
      display-name: "<gold>Storage</gold>"
      lore:
        - "<gray>Open your persistent Storage pages.</gray>"
      action: STORAGE
    tuning:
      slot: 18
      material: AMETHYST_SHARD
      display-name: "<light_purple>Stats Tuning</light_purple>"
      lore:
        - "<gray>Spend tuning points from Magical Power.</gray>"
      action: TUNING
    equipment:
      slot: 19
      material: CHAINMAIL_CHESTPLATE
      display-name: "<yellow>Equipment</yellow>"
      lore:
        - "<gray>Equip necklaces, cloaks, belts, and gloves.</gray>"
      action: EQUIPMENT
    wardrobe:
      slot: 21
      material: ARMOR_STAND
      display-name: "<aqua>Wardrobe</aqua>"
      lore:
        - "<gray>Store and swap armor setups.</gray>"
      action: WARDROBE
    collections:
      slot: 26
      material: CHEST
      display-name: "<gold>Collections</gold>"
      lore:
        - "<gray>View your collection tiers.</gray>"
      action: COLLECTIONS
    recipes:
      slot: 20
      material: CRAFTING_TABLE
      display-name: "<green>Recipes</green>"
      lore:
        - "<gray>View unlocked SkyBlock recipes.</gray>"
      action: RECIPES
    bank:
      slot: 22
      material: GOLD_INGOT
      display-name: "<gold>Bank</gold>"
      lore:
        - "<gray>Purse:</gray> <gold><purse></gold>"
        - "<gray>Bank:</gray> <gold><bank></gold>"
      action: BANK
    shops:
      slot: 23
      material: EMERALD
      display-name: "<green>NPC Shops</green>"
      lore:
        - "<gray>Browse configured NPC merchants.</gray>"
      action: SHOPS
    auctions:
      slot: 30
      material: GOLDEN_HORSE_ARMOR
      display-name: "<gold>Auction House</gold>"
      lore:
        - "<gray>Browse BIN and bid listings.</gray>"
      action: AUCTIONS
    bazaar:
      slot: 31
      material: ENDER_EYE
      display-name: "<green>Bazaar</green>"
      lore:
        - "<gray>Browse market products and order books.</gray>"
      action: BAZAAR
    quest-log:
      slot: 32
      material: WRITABLE_BOOK
      display-name: "<green>Quest Log</green>"
      lore:
        - "<gray>Track configured SkyBlock objectives.</gray>"
      action: QUEST_LOG
    pets:
      slot: 24
      material: BONE
      display-name: "<aqua>Pets</aqua>"
      lore:
        - "<gray>View, level, and summon your pets.</gray>"
      action: PETS
    minions:
      slot: 25
      material: HAY_BLOCK
      display-name: "<yellow>Minions</yellow>"
      lore:
        - "<gray>View recorded minions.</gray>"
      action: MINIONS
    reforge-anvil:
      slot: 27
      material: ANVIL
      display-name: "<gold>Reforge Anvil</gold>"
      lore:
        - "<gray>Apply configured reforges and Reforge Stones.</gray>"
      action: REFORGE_ANVIL
    enchanting-table:
      slot: 28
      material: ENCHANTING_TABLE
      display-name: "<light_purple>Enchanting Table</light_purple>"
      lore:
        - "<gray>Apply configured enchantments to custom items.</gray>"
      action: ENCHANTING_TABLE
    enchanting-anvil:
      slot: 29
      material: ANVIL
      display-name: "<gold>Anvil</gold>"
      lore:
        - "<gray>Apply configured enchanted books to custom items.</gray>"
      action: ENCHANTING_ANVIL

island-management:
  title: "<dark_gray>Island Management</dark_gray>"
  rows: 3
  filler:
    enabled: true
    material: GRAY_STAINED_GLASS_PANE
    display-name: "<dark_gray></dark_gray>"
    lore: []
  items:
    summary:
      slot: 4
      material: GRASS_BLOCK
      display-name: "<green><owner>'s Island</green>"
      lore:
        - "<gray>World:</gray> <yellow><world></yellow>"
        - "<gray>Border:</gray> <yellow><border_size></yellow><gray>x</gray><yellow><border_size></yellow>"
        - "<gray>Home:</gray> <yellow><home_x></yellow><gray>,</gray> <yellow><home_y></yellow><gray>,</gray> <yellow><home_z></yellow>"
        - "<gray>Visitors:</gray> <visitors_status>"
        - "<gray>Guests Online:</gray> <yellow><visitors></yellow><gray>/</gray><yellow><visitor_limit></yellow>"
        - "<gray>Co-op Members:</gray> <yellow><coop_members></yellow><gray>/</gray><yellow><coop_member_limit></yellow>"
        - "<gray>Warps:</gray> <yellow><warps></yellow><gray>/</gray><yellow><warp_limit></yellow>"
        - "<gray>Placed Minions:</gray> <yellow><minions></yellow>"
      action: NONE
    home:
      slot: 11
      material: ENDER_PEARL
      display-name: "<green>Travel Home</green>"
      lore:
        - "<gray>Create or teleport to your private island.</gray>"
        - "<gray>Home:</gray> <yellow><home_x></yellow><gray>,</gray> <yellow><home_y></yellow><gray>,</gray> <yellow><home_z></yellow>"
        - ""
        - "<yellow>Click to travel.</yellow>"
      action: HOME
    set-home:
      slot: 12
      material: COMPASS
      display-name: "<green>Set Island Home</green>"
      lore:
        - "<gray>Set the shared island home to your current location.</gray>"
        - "<gray>Co-op members can use this on the island.</gray>"
        - ""
        - "<yellow>Click to set home.</yellow>"
      action: SET_HOME
    visitors:
      slot: 13
      material: OAK_DOOR
      display-name: "<aqua>Visitor Access</aqua>"
      lore:
        - "<gray>Current:</gray> <visitors_status>"
        - "<gray>Guest Limit:</gray> <yellow><visitors></yellow><gray>/</gray><yellow><visitor_limit></yellow>"
        - "<gray>Open islands can be visited with</gray>"
        - "<yellow>/skyblock island visit <owner></yellow>"
        - ""
        - "<yellow>Click to toggle.</yellow>"
      action: TOGGLE_VISITORS
    warps:
      slot: 14
      material: ENDER_EYE
      display-name: "<light_purple>Island Warps</light_purple>"
      lore:
        - "<gray>Warps:</gray> <yellow><warps></yellow><gray>/</gray><yellow><warp_limit></yellow>"
        - "<gray>Use named warp points to move around</gray>"
        - "<gray>your private island.</gray>"
        - ""
        - "<yellow>Click to list warps.</yellow>"
      action: WARPS
    reset:
      slot: 15
      material: TNT
      display-name: "<red>Reset Island</red>"
      lore:
        - "<gray>Delete this island world and rebuild</gray>"
        - "<gray>the starter island.</gray>"
        - "<gray>Requires typed confirmation.</gray>"
        - ""
        - "<yellow>Click for reset instructions.</yellow>"
      action: RESET
    info:
      slot: 16
      material: MAP
      display-name: "<yellow>Island Info</yellow>"
      lore:
        - "<gray>Show the current island status in chat.</gray>"
        - "<gray>Border:</gray> <yellow><border_size></yellow><gray>x</gray><yellow><border_size></yellow>"
        - "<gray>Co-op Members:</gray> <yellow><coop_members></yellow><gray>/</gray><yellow><coop_member_limit></yellow>"
        - ""
        - "<yellow>Click to show info.</yellow>"
      action: INFO
    back:
      slot: 22
      material: NETHER_STAR
      display-name: "<green>SkyBlock Menu</green>"
      lore: []
      action: BACK

