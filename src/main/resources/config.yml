islands:
  world-prefix: "openskyblock_island_"
  spawn-y: 80
  starter-radius: 3
  schematic:
    enabled: false
    file: "schematics/starter.schem"
    paste-x: 0
    paste-y-offset: -1
    paste-z: 0
    paste-air: false
    paste-entities: false
    fallback-platform: true
  border-size: 160
  border-warning-blocks: 5
  home-yaw: 180.0
  home-pitch: 0.0
  default-visitors-enabled: false
  max-visitors: 1
  warps:
    max: 56
    max-name-length: 24
  teleport-pads:
    enabled: true
    max: 12
    material: LIGHT_WEIGHTED_PRESSURE_PLATE
    cooldown-ticks: 20
  reset:
    enabled: true
    confirmation-word: "RESET"
    confirmation-seconds: 60
    clear-warps: true
    clear-teleport-pads: true
    clear-minions: true
    clear-cakes: true
  coop:
    max-members: 5
    invite-expire-seconds: 60
    default-role: member
    permissions:
      build: true
      interact: true
      set-home: true
      manage-warps: true
      manage-teleport-pads: true
      manage-coop: false
      reset: false
    roles:
      member:
        display-name: "<green>Member</green>"
        permissions:
          build: true
          interact: true
          set-home: true
          manage-warps: true
          manage-teleport-pads: true
          manage-coop: false
          reset: false
      trusted:
        display-name: "<aqua>Trusted</aqua>"
        permissions:
          build: true
          interact: true
          set-home: true
          manage-warps: true
          manage-teleport-pads: true
          manage-coop: false
          reset: false
      manager:
        display-name: "<gold>Manager</gold>"
        permissions:
          build: true
          interact: true
          set-home: true
          manage-warps: true
          manage-teleport-pads: true
          manage-coop: true
          reset: false

minions:
  max-per-profile: 5

bank:
  capacity: 1000000.0
  interest:
    enabled: true
    interval-seconds: 111600
    max-accruals: 2
    max-payout: 300000.0
    brackets:
      starter:
        up-to: 10000000.0
        rate: 0.02
      gold:
        up-to: 15000000.0
        rate: 0.01
      platinum:
        up-to: 30000000.0
        rate: 0.005

shop-npcs:
  respawn-ticks: 200

item-abilities:
  base-mana: 100.0
  mana-per-intelligence: 1.0
  mana-regen-flat: 10.0
  mana-regen-percent: 0.02
  max-teleport-distance: 12.0
  action-bar: true

stats:
  base:
    health: 100.0
    defense: 0.0
    damage: 5.0
    strength: 0.0
    crit_chance: 30.0
    crit_damage: 50.0
    intelligence: 0.0
    speed: 100.0
    ferocity: 0.0
    trophy_fish_chance: 0.0
  display-order:
    - health
    - defense
    - damage
    - strength
    - crit_chance
    - crit_damage
    - intelligence
    - speed
    - ferocity
    - magical_power
    - magic_find
    - pet_luck
    - farming_fortune
    - mining_fortune
    - mining_wisdom
    - pristine
    - foraging_fortune
    - sea_creature_chance
    - trophy_fish_chance
    - vitality
    - true_defense
    - cold_resistance
    - rift_time
  magical-power:
    COMMON: 3
    UNCOMMON: 5
    RARE: 8
    EPIC: 12
    LEGENDARY: 16
    MYTHIC: 22
    SPECIAL: 3
  tuning:
    magical-power-per-point: 10
    values:
      health: 5.0
      defense: 1.0
      strength: 1.0
      crit_chance: 0.2
      crit_damage: 1.0
      intelligence: 2.0
      speed: 1.0

accessory-bag:
  capacity: 18
