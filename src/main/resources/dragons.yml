settings:
  eyes-required: 8
  max-placed-eyes: 8
  summoning-eye-item: SUMMONING_EYE
  base-coin-reward: 5000.0
  skyblock-xp-per-kill: 0.25
  skyblock-xp-per-unique-dragon: 2.0
  live:
    enabled: true
    auto-spawn-on-ready: true
    allow-simulated-fights: true
    one-per-world: true
    timeout-seconds: 600
    participant-radius: 160.0
    minimum-reward-damage: 1.0
    physical-health: 200.0
    refund-eyes-on-timeout: false
    refund-eyes-on-shutdown: true
    broadcast-spawn: true
    broadcast-defeat: true
    spawn-offset:
      x: 0.0
      y: 20.0
      z: 0.0
    boss-bar:
      enabled: true
      color: PURPLE
      overlay: PROGRESS
    combat:
      enabled: true
      enforce-configured-phases: true
      tick-interval-ticks: 5
      default-abilities:
        - RUSH
        - FIREBALL
        - LIGHTNING
      phases:
        NORMAL:
          display-name: "<light_purple>Sky Assault</light_purple>"
          minimum-health-percent: 50.0
          native-phase: CIRCLING
          outgoing-damage-multiplier: 1.0
          cooldown-multiplier: 1.0
          announce: false
        ENRAGED:
          display-name: "<red>Enraged</red>"
          minimum-health-percent: 0.0
          native-phase: STRAFING
          outgoing-damage-multiplier: 1.5
          cooldown-multiplier: 0.67
          announce: true
      abilities:
        RUSH:
          display-name: "<red>Rush</red>"
          type: RUSH
          initial-delay-seconds: 8.0
          cooldown-seconds: 18.0
          duration-seconds: 4.0
          damage: 12.0
          radius: 3.0
          range: 80.0
          speed: 2.2
          target-count: 1
          native-phase: CHARGE_PLAYER
          particle: EXPLOSION
          sound: "entity.ender_dragon.growl"
          announce: true
        FIREBALL:
          display-name: "<gold>Fireball</gold>"
          type: FIREBALL
          initial-delay-seconds: 4.0
          cooldown-seconds: 12.0
          duration-seconds: 2.0
          damage: 10.0
          radius: 4.0
          range: 90.0
          speed: 1.2
          target-count: 1
          native-phase: STRAFING
          particle: DRAGON_BREATH
          sound: "entity.ender_dragon.shoot"
          announce: false
        LIGHTNING:
          display-name: "<yellow>Lightning</yellow>"
          type: LIGHTNING
          initial-delay-seconds: 12.0
          cooldown-seconds: 22.0
          duration-seconds: 1.5
          damage: 8.0
          radius: 2.0
          range: 70.0
          speed: 1.0
          target-count: 3
          native-phase: CIRCLING
          particle: ELECTRIC_SPARK
          sound: "entity.lightning_bolt.thunder"
          announce: true
        PROXIMITY_BLAST:
          display-name: "<dark_purple>Unstable Blast</dark_purple>"
          type: AREA_BLAST
          initial-delay-seconds: 6.0
          cooldown-seconds: 10.0
          duration-seconds: 1.0
          damage: 10.0
          radius: 8.0
          range: 8.0
          speed: 1.0
          target-count: 0
          native-phase: CIRCLING
          particle: ELECTRIC_SPARK
          sound: "entity.generic.explode"
          announce: true
        DEATH_BLAST:
          display-name: "<dark_purple>Final Instability</dark_purple>"
          type: AREA_BLAST
          initial-delay-seconds: 0.0
          cooldown-seconds: 1.0
          duration-seconds: 1.0
          damage: 16.0
          radius: 12.0
          range: 12.0
          speed: 1.0
          target-count: 0
          native-phase: DYING
          particle: EXPLOSION
          sound: "entity.generic.explode"
          announce: true
  damage-ranks:
    first: 1000000.0
    second: 500000.0
    third: 100000.0

